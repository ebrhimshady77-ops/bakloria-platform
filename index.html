<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة بكالوريا مصر - المطور شادي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b1120; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .shady-btn { background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loginSection" class="flex items-center justify-center min-h-screen p-6">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl border-t-4 border-sky-500 text-center">
            <h1 class="text-2xl font-bold mb-6 text-sky-400">بكالوريا مصر 2026</h1>
            <div class="space-y-4">
                <input type="text" id="regName" placeholder="الاسم بالكامل" class="w-full bg-black/30 p-4 rounded-2xl border border-white/10 outline-none focus:border-sky-500 text-white">
                <input type="text" id="regPhone" placeholder="رقم الهاتف أو البريد" class="w-full bg-black/30 p-4 rounded-2xl border border-white/10 outline-none focus:border-sky-500 text-white">
                <input type="password" id="regPass" placeholder="كلمة المرور" class="w-full bg-black/30 p-4 rounded-2xl border border-white/10 outline-none focus:border-sky-500 text-white">
                
                <button onclick="startApp()" class="w-full shady-btn p-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all">دخول</button>
            </div>
        </div>
    </div>

    <div id="appSection" class="hidden min-h-screen">
        <nav class="p-5 flex justify-between items-center glass sticky top-0 z-50">
            <div class="font-bold text-sky-400">بكالوريا مصر</div>
            <div class="flex gap-2">
                <button id="devUsersBtn" onclick="openUsersList()" class="hidden bg-sky-600/20 text-sky-400 px-3 py-2 rounded-xl text-[10px] border border-sky-500/30 font-bold">معلومات المستخدمين</button>
                <button onclick="document.getElementById('profilePop').classList.remove('hidden')" class="bg-white/5 px-3 py-2 rounded-xl text-[10px] border border-white/10 font-bold">تعديل ملفي</button>
            </div>
        </nav>

        <main class="max-w-4xl mx-auto p-4 mt-6">
            <div class="grid grid-cols-1 gap-4">
                <button onclick="loadSection('برمجة')" class="glass p-6 rounded-[2rem] flex justify-between items-center active:scale-95 transition-all border-r-4 border-sky-500">
                    <span class="text-lg font-bold">البرمجة والذكاء الاصطناعي</span>
                    <i class="fas fa-code text-sky-500"></i>
                </button>
                <button onclick="loadSection('اختبارات')" class="glass p-6 rounded-[2rem] flex justify-between items-center active:scale-95 transition-all border-r-4 border-purple-500">
                    <span class="text-lg font-bold">اختبارات</span>
                    <i class="fas fa-file-alt text-purple-500"></i>
                </button>
                <button onclick="loadSection('أخبار')" class="glass p-6 rounded-[2rem] flex justify-between items-center active:scale-95 transition-all border-r-4 border-green-500">
                    <span class="text-lg font-bold">أخبار</span>
                    <i class="fas fa-newspaper text-green-500"></i>
                </button>
            </div>

            <div id="shadyAdminPanel" class="hidden mt-8 glass p-6 rounded-3xl border-dashed border-sky-500/50">
                <p class="text-sky-400 text-sm mb-4 font-bold">أهلاً يا مبرمج شادي - إضافة لـ <span id="targetName"></span></p>
                <div class="space-y-4">
                    <textarea id="shadyText" placeholder="اكتب نص أو شرح هنا..." class="w-full bg-black/40 p-4 rounded-xl border border-white/10 outline-none text-sm h-20 text-white"></textarea>
                    <div class="flex gap-2">
                        <input type="text" id="shadyLink" placeholder="ضع رابط (URL) هنا" class="flex-1 bg-black/40 p-3 rounded-xl border border-white/10 outline-none text-xs text-white">
                        <label class="bg-white/10 p-3 rounded-xl cursor-pointer border border-white/10">
                            <i class="fas fa-file-upload"></i>
                            <input type="file" id="shadyFile" class="hidden" onchange="postContent('file')">
                        </label>
                    </div>
                    <button onclick="postContent('text')" class="w-full shady-btn p-3 rounded-xl font-bold">نشر الآن</button>
                </div>
            </div>

            <div id="displayArea" class="mt-10 pb-48 space-y-4 text-right"></div>
        </main>

        <div id="usersPop" class="hidden fixed inset-0 bg-black/95 z-[100] p-6 overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-sky-400 underline">قائمة بيانات الطلاب</h2>
                <button onclick="document.getElementById('usersPop').classList.add('hidden')" class="text-3xl">&times;</button>
            </div>
            <div id="usersDataContainer" class="grid gap-4"></div>
        </div>

        <div id="profilePop" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-6 text-right">
            <div class="glass p-8 rounded-3xl w-full max-w-sm">
                <h2 class="text-xl font-bold mb-6 text-sky-400">تعديل بياناتك</h2>
                <input type="text" id="editN" placeholder="الاسم" class="w-full bg-black/40 p-4 rounded-xl border border-white/10 mb-4 outline-none text-white">
                <input type="text" id="editP" placeholder="رقم الهاتف" class="w-full bg-black/40 p-4 rounded-xl border border-white/10 mb-6 outline-none text-white">
                <button onclick="saveEdit()" class="w-full shady-btn p-4 rounded-xl font-bold mb-2">حفظ التغييرات</button>
                <button onclick="document.getElementById('profilePop').classList.add('hidden')" class="w-full text-gray-500 text-sm">رجوع</button>
            </div>
        </div>

        <footer class="fixed bottom-0 w-full p-6 text-center z-40 bg-[#0b1120]/95 backdrop-blur-lg">
            <a href="https://wa.me/201032821631" target="_blank" class="shady-btn w-full max-w-sm px-10 py-4 rounded-2xl font-bold inline-flex items-center justify-center gap-3">
                <i class="fab fa-whatsapp text-2xl"></i> تواصل مع المطور شادي
            </a>
        </footer>
    </div>

    <script>
        let myData = { isAdmin: false };
        let currentSec = '';
        let appMemory = JSON.parse(localStorage.getItem('shadyMemory')) || { 'برمجة': [], 'اختبارات': [], 'أخبار': [] };
        let studentLogs = JSON.parse(localStorage.getItem('shadyLogs')) || [];

        window.onload = function() {
            const savedUser = localStorage.getItem('shadyUser');
            if (savedUser) {
                myData = JSON.parse(savedUser);
                showApp();
            }
        };

        function startApp() {
            const n = document.getElementById('regName').value.trim();
            const p = document.getElementById('regPhone').value.trim();
            const pass = document.getElementById('regPass').value.trim();
            if(!n || !p || !pass) return alert('البيانات ناقصة يا شادي!');

            // --- شرط الأمان الخاص بشادي ---
            if (pass === "2899") {
                if (n !== "شادي إبراهيم رجب شريف" || p !== "01032821631") {
                    alert("خطأ: هذا الكود مخصص للمطور شادي فقط ببياناته الأصلية!");
                    return;
                }
            }

            myData = { name: n, phone: p, password: pass, isAdmin: (pass === '2899') };
            
            const isExist = studentLogs.find(u => u.phone === p && u.name === n);
            if (!isExist) {
                studentLogs.push(myData);
                localStorage.setItem('shadyLogs', JSON.stringify(studentLogs));
            }
            
            localStorage.setItem('shadyUser', JSON.stringify(myData));
            showApp();
        }

        function showApp() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('appSection').classList.remove('hidden');
            document.getElementById('editN').value = myData.name;
            document.getElementById('editP').value = myData.phone;
            if(myData.isAdmin) document.getElementById('devUsersBtn').classList.remove('hidden');
        }

        function loadSection(sec) {
            currentSec = sec;
            document.getElementById('targetName').innerText = sec;
            if(myData.isAdmin) document.getElementById('shadyAdminPanel').classList.remove('hidden');
            renderView();
        }

        function postContent(type) {
            let item = { id: Date.now() };
            if(type === 'file') {
                const f = document.getElementById('shadyFile').files[0];
                if(f) item = { ...item, type: 'ملف', title: f.name, link: URL.createObjectURL(f) };
            } else {
                const txt = document.getElementById('shadyText').value;
                const lnk = document.getElementById('shadyLink').value;
                if(!txt && !lnk) return;
                item = { ...item, type: 'محتوى', title: txt || 'رابط مضاف', link: lnk || '#' };
                document.getElementById('shadyText').value = '';
                document.getElementById('shadyLink').value = '';
            }
            if(item.title) { 
                appMemory[currentSec].push(item); 
                localStorage.setItem('shadyMemory', JSON.stringify(appMemory));
                renderView(); 
            }
        }

        function renderView() {
            const box = document.getElementById('displayArea');
            box.innerHTML = `<h3 class="text-sky-400 font-bold mb-4 border-b border-sky-500/20 pb-2">قسم ${currentSec}:</h3>`;
            appMemory[currentSec].forEach(i => {
                box.innerHTML += `
                    <div class="glass p-5 rounded-2xl flex justify-between items-center border-l-2 border-sky-500 mb-3">
                        <div class="flex-1">
                            <p class="text-sm font-bold text-white">${i.title}</p>
                            ${i.link !== '#' ? `<a href="${i.link}" target="_blank" class="text-[10px] text-sky-400 underline">معاينة الرابط/الملف</a>` : ''}
                        </div>
                        ${myData.isAdmin ? `<button onclick="delItem(${i.id})" class="text-red-500 px-3 py-1 hover:bg-red-500/10 rounded-lg transition-colors"><i class="fas fa-trash-alt"></i></button>` : ''}
                    </div>`;
            });
        }

        function delItem(id) {
            if(confirm('هل أنت متأكد من حذف هذا المحتوى؟')) {
                appMemory[currentSec] = appMemory[currentSec].filter(x => x.id !== id);
                localStorage.setItem('shadyMemory', JSON.stringify(appMemory));
                renderView();
            }
        }

        function openUsersList() {
            document.getElementById('usersPop').classList.remove('hidden');
            const box = document.getElementById('usersDataContainer');
            box.innerHTML = studentLogs.map(s => `
                <div class="glass p-4 rounded-xl border-r-4 border-sky-500 text-right">
                    <p class="text-sky-400 font-bold">الاسم: ${s.name}</p>
                    <p class="text-xs">الرقم/البريد: ${s.phone}</p>
                    <p class="text-xs text-yellow-500 font-bold">الباسورد: ${s.password}</p>
                </div>
            `).join('');
        }

        function saveEdit() {
            myData.name = document.getElementById('editN').value;
            myData.phone = document.getElementById('editP').value;
            localStorage.setItem('shadyUser', JSON.stringify(myData));
            alert('تم تحديث بياناتك بنجاح');
            document.getElementById('profilePop').classList.add('hidden');
        }
    </script>
</body>
</html>
