<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة بكالوريا مصر - المطور شادي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { background-color: #0b1120; color: white; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .shady-btn { background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%); }
        .hidden { display: none !important; }
        .animate-fade { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="loginSection" class="flex items-center justify-center min-h-screen p-6">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl border-t-4 border-sky-500 text-center animate-fade">
            <h1 class="text-2xl font-bold mb-2 text-sky-400">بكالوريا مصر 2026</h1>
            <p class="text-[10px] text-gray-400 mb-6 font-bold">بإشراف المطور شادي إبراهيم</p>
            <div class="space-y-4">
                <input type="text" id="regName" placeholder="الاسم بالكامل" class="w-full bg-black/30 p-4 rounded-2xl border border-white/10 outline-none focus:border-sky-500 text-white text-center">
                <input type="text" id="regPhone" placeholder="رقم الهاتف" class="w-full bg-black/30 p-4 rounded-2xl border border-white/10 outline-none focus:border-sky-500 text-white text-center">
                <input type="password" id="regPass" placeholder="كلمة المرور" class="w-full bg-black/30 p-4 rounded-2xl border border-white/10 outline-none focus:border-sky-500 text-white text-center">
                <button onclick="startApp()" class="w-full shady-btn p-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all">دخول المنصة</button>
            </div>
        </div>
    </div>

    <div id="appSection" class="hidden min-h-screen">
        <nav class="p-5 flex justify-between items-center glass sticky top-0 z-50">
            <div class="font-bold text-sky-400 text-lg">بكالوريا مصر</div>
            <button id="devUsersBtn" onclick="openUsersList()" class="hidden bg-sky-600/20 text-sky-400 px-4 py-2 rounded-xl text-xs border border-sky-500/30 font-bold">قائمة الطلاب</button>
        </nav>

        <main class="max-w-4xl mx-auto p-4 mt-6">
            <div id="subjectsList" class="grid grid-cols-1 gap-4">
                <button onclick="loadSection('برمجة')" class="glass p-6 rounded-[2rem] flex justify-between items-center border-r-4 border-sky-500 hover:bg-white/5 transition-all">
                    <span class="text-lg font-bold">البرمجة والذكاء الاصطناعي</span>
                    <i class="fas fa-code text-sky-500 text-2xl"></i>
                </button>
                <button onclick="loadSection('اختبارات')" class="glass p-6 rounded-[2rem] flex justify-between items-center border-r-4 border-purple-500 hover:bg-white/5 transition-all">
                    <span class="text-lg font-bold">قسم الاختبارات</span>
                    <i class="fas fa-file-alt text-purple-500 text-2xl"></i>
                </button>
                <button onclick="loadSection('تاريخ')" class="glass p-6 rounded-[2rem] flex justify-between items-center border-r-4 border-yellow-500 hover:bg-white/5 transition-all">
                    <span class="text-lg font-bold">مادة التاريخ</span>
                    <i class="fas fa-landmark text-yellow-500 text-2xl"></i>
                </button>
            </div>

            <div id="shadyAdminPanel" class="hidden mt-8 animate-fade">
                <div class="glass p-6 rounded-3xl border-dashed border-sky-500/50">
                    <div class="flex justify-between items-center mb-4">
                        <p class="text-sky-400 text-sm font-bold italic">إضافة محتوى لـ: <span id="targetName" class="text-white underline"></span></p>
                        <button onclick="closeSection()" class="text-xs text-gray-400 underline">رجوع للمواد</button>
                    </div>
                    <div class="space-y-4">
                        <textarea id="shadyText" placeholder="اكتب وصف أو شرح للملف..." class="w-full bg-black/40 p-4 rounded-xl border border-white/10 outline-none text-white text-sm h-20"></textarea>
                        <input type="text" id="shadyLink" placeholder="ضع رابط الملف (URL) هنا..." class="w-full bg-black/40 p-4 rounded-xl border border-white/10 outline-none text-white text-sm">
                        <button onclick="uploadContent()" class="w-full bg-sky-600 p-4 rounded-2xl font-bold hover:bg-sky-500 transition-all">نشر المحتوى</button>
                    </div>
                </div>
            </div>

            <div id="displayArea" class="mt-8 pb-32 space-y-4 text-right"></div>
        </main>
    </div>

    <div id="usersPop" class="hidden fixed inset-0 bg-black/95 z-[100] p-6 overflow-y-auto animate-fade">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-sky-400">الطلاب المسجلين</h2>
            <button onclick="document.getElementById('usersPop').classList.add('hidden')" class="text-3xl">&times;</button>
        </div>
        <div id="usersDataContainer" class="grid gap-3"></div>
    </div>

    <script>
        // إعدادات فايربيز (نفس بيانات مشروعك)
        const firebaseConfig = {
            apiKey: "AIzaSyDsKaCg8BP7g7Qh7_FotDHNtvdYlws1FdQ",
            authDomain: "bakloria-egypt.firebaseapp.com",
            databaseURL: "https://bakloria-egypt-default-rtdb.firebaseio.com",
            projectId: "bakloria-egypt",
            storageBucket: "bakloria-egypt.appspot.com",
            messagingSenderId: "876188936751",
            appId: "1:876188936751:web:fca10e38cc198f9faa74da"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myData = { isAdmin: false };
        let currentSec = '';

        function startApp() {
            const n = document.getElementById('regName').value;
            const p = document.getElementById('regPhone').value;
            const pass = document.getElementById('regPass').value;
            if(!n || !p || !pass) return alert('يا شادي، كمل البيانات!');
            
            myData = { name: n, phone: p, password: pass, isAdmin: (pass === '2899') };
            db.ref('students').push(myData);
            
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
            if(myData.isAdmin) document.getElementById('devUsersBtn').classList.remove('hidden');
        }

        function loadSection(sec) {
            currentSec = sec;
            document.getElementById('subjectsList').classList.add('hidden');
            document.getElementById('targetName').innerText = sec;
            if(myData.isAdmin) document.getElementById('shadyAdminPanel').classList.remove('hidden');
            
            // جلب البيانات الخاصة بالقسم المختار فقط
            db.ref('content/' + sec).on('value', (snapshot) => {
                renderView(snapshot.val());
            });
        }

        function closeSection() {
            currentSec = '';
            document.getElementById('subjectsList').classList.remove('hidden');
            document.getElementById('shadyAdminPanel').classList.add('hidden');
            document.getElementById('displayArea').innerHTML = '';
        }

        function uploadContent() {
            const text = document.getElementById('shadyText').value;
            const link = document.getElementById('shadyLink').value;
            if(!text) return alert("اكتب وصفاً للمحتوى أولاً");
            
            db.ref('content/' + currentSec).push({
                title: text,
                link: link || '#',
                timestamp: Date.now()
            }).then(() => {
                document.getElementById('shadyText').value = '';
                document.getElementById('shadyLink').value = '';
            });
        }

        function renderView(data) {
            const box = document.getElementById('displayArea');
            box.innerHTML = `<h3 class="text-sky-400 font-bold mb-4">محتوى قسم ${currentSec}:</h3>`;
            
            if(data) {
                Object.keys(data).reverse().forEach(key => {
                    const item = data[key];
                    const hasLink = item.link && item.link !== '#';
                    box.innerHTML += `
                        <div class="glass p-5 rounded-2xl flex justify-between items-center border-l-2 border-sky-500 mb-3 animate-fade">
                            <div class="flex-1">
                                <p class="text-sm font-bold text-white">${item.title}</p>
                                ${hasLink ? 
                                    `<a href="${item.link}" target="_blank" class="text-xs text-sky-400 font-bold underline mt-2 inline-block italic">فتح الرابط/الملف</a>` 
                                    : `<span class="text-[10px] text-gray-500 mt-2 block italic">محتوى نصي</span>`
                                }
                            </div>
                            ${myData.isAdmin ? `
                                <button onclick="db.ref('content/${currentSec}/${key}').remove()" class="text-red-500 p-2 text-sm">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            ` : ''}
                        </div>`;
                });
            } else {
                box.innerHTML += `<p class="text-center text-gray-500 py-10">لا يوجد دروس هنا بعد.</p>`;
            }
        }

        function openUsersList() {
            document.getElementById('usersPop').classList.remove('hidden');
            db.ref('students').on('value', (snapshot) => {
                const students = snapshot.val();
                const container = document.getElementById('usersDataContainer');
                container.innerHTML = '';
                if(students) {
                    Object.keys(students).forEach(id => {
                        const s = students[id];
                        container.innerHTML += `
                            <div class="glass p-4 rounded-xl flex justify-between items-center border-r-4 border-gray-600">
                                <div class="text-right">
                                    <p class="text-sky-400 font-bold text-sm">${s.name}</p>
                                    <p class="text-[10px] text-gray-500">${s.phone}</p>
                                </div>
                                <button onclick="db.ref('students/${id}').remove()" class="text-red-400 text-xs">حذف</button>
                            </div>`;
                    });
                }
            });
        }
    </script>
</body>
</html>
