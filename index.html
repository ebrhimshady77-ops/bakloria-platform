<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة بكالوريا مصر - المطور شادي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { background-color: #0b1120; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .shady-btn { background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loginSection" class="flex items-center justify-center min-h-screen p-6">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl border-t-4 border-sky-500 text-center">
            <h1 class="text-2xl font-bold mb-6 text-sky-400">بكالوريا مصر 2026</h1>
            <div class="space-y-4">
                <input type="text" id="regName" placeholder="الاسم بالكامل" class="w-full bg-black/30 p-4 rounded-2xl border border-white/10 outline-none focus:border-sky-500 text-white text-right">
                <input type="text" id="regPhone" placeholder="رقم الهاتف أو البريد" class="w-full bg-black/30 p-4 rounded-2xl border border-white/10 outline-none focus:border-sky-500 text-white text-right">
                <input type="password" id="regPass" placeholder="كلمة المرور" class="w-full bg-black/30 p-4 rounded-2xl border border-white/10 outline-none focus:border-sky-500 text-white text-right">
                <button onclick="startApp()" class="w-full shady-btn p-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all">دخول</button>
            </div>
        </div>
    </div>

    <div id="appSection" class="hidden min-h-screen">
        <nav class="p-5 flex justify-between items-center glass sticky top-0 z-50">
            <div class="font-bold text-sky-400 text-lg">بكالوريا مصر</div>
            <div class="flex gap-2">
                <button id="devUsersBtn" onclick="openUsersList()" class="hidden bg-sky-600/20 text-sky-400 px-3 py-2 rounded-xl text-[10px] border border-sky-500/30 font-bold">قائمة الطلاب</button>
                <button onclick="document.getElementById('profilePop').classList.remove('hidden')" class="bg-white/5 px-3 py-2 rounded-xl text-[10px] border border-white/10 font-bold">ملفي</button>
            </div>
        </nav>

        <main class="max-w-4xl mx-auto p-4 mt-6">
            <div class="grid grid-cols-1 gap-4">
                <button onclick="loadSection('برمجة')" class="glass p-6 rounded-[2rem] flex justify-between items-center active:scale-95 transition-all border-r-4 border-sky-500">
                    <span class="text-lg font-bold">البرمجة والذكاء الاصطناعي</span>
                    <i class="fas fa-code text-sky-500"></i>
                </button>
                <button onclick="loadSection('اختبارات')" class="glass p-6 rounded-[2rem] flex justify-between items-center active:scale-95 transition-all border-r-4 border-purple-500">
                    <span class="text-lg font-bold">اختبارات</span>
                    <i class="fas fa-file-alt text-purple-500"></i>
                </button>
                <button onclick="loadSection('أخبار')" class="glass p-6 rounded-[2rem] flex justify-between items-center active:scale-95 transition-all border-r-4 border-green-500">
                    <span class="text-lg font-bold">أخبار</span>
                    <i class="fas fa-newspaper text-green-500"></i>
                </button>
            </div>

            <div id="shadyAdminPanel" class="hidden mt-8 glass p-6 rounded-3xl border-dashed border-sky-500/50">
                <p class="text-sky-400 text-sm mb-4 font-bold">أهلاً شادي - إضافة لـ <span id="targetName"></span></p>
                <div class="space-y-4">
                    <textarea id="shadyText" placeholder="اكتب النص هنا..." class="w-full bg-black/40 p-4 rounded-xl border border-white/10 outline-none text-sm h-20 text-white text-right"></textarea>
                    <input type="text" id="shadyLink" placeholder="رابط خارجي" class="w-full bg-black/40 p-3 rounded-xl border border-white/10 outline-none text-xs text-white text-right">
                    <button onclick="postContent()" class="w-full shady-btn p-3 rounded-xl font-bold">نشر للكل</button>
                </div>
            </div>

            <div id="displayArea" class="mt-10 pb-48 space-y-4 text-right"></div>
        </main>

        <div id="usersPop" class="hidden fixed inset-0 bg-black/95 z-[100] p-6 overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-sky-400 underline">بيانات الـ 1000 طالب</h2>
                <button onclick="document.getElementById('usersPop').classList.add('hidden')" class="text-3xl">&times;</button>
            </div>
            <div id="usersDataContainer" class="grid gap-4"></div>
        </div>

        <div id="profilePop" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-6 text-right">
            <div class="glass p-8 rounded-3xl w-full max-w-sm">
                <h2 class="text-xl font-bold mb-6 text-sky-400">تعديل ملفك</h2>
                <input type="text" id="editN" class="w-full bg-black/40 p-4 rounded-xl border border-white/10 mb-4 text-white">
                <input type="text" id="editP" class="w-full bg-black/40 p-4 rounded-xl border border-white/10 mb-6 text-white">
                <button onclick="saveEdit()" class="w-full shady-btn p-4 rounded-xl font-bold">حفظ التعديل</button>
            </div>
        </div>

        <footer class="fixed bottom-0 w-full p-6 text-center z-40 bg-[#0b1120]/95 backdrop-blur-lg text-white">
            <a href="https://wa.me/201032821631" target="_blank" class="shady-btn w-full max-w-sm px-10 py-4 rounded-2xl font-bold inline-flex items-center justify-center gap-3">
                <i class="fab fa-whatsapp text-2xl"></i> تواصل مع المطور شادي
            </a>
        </footer>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDsKsCgBBP7g7Qh7_FotDHNtvDYlws1FdQ",
            authDomain: "bakloria-egypt.firebaseapp.com",
            databaseURL: "https://bakloria-egypt-default-rtdb.firebaseio.com",
            projectId: "bakloria-egypt",
            storageBucket: "bakloria-egypt.appspot.com",
            messagingSenderId: "876188936751",
            appId: "1:876188936751:web:fca10e38cc198f9faa74da"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myData = { isAdmin: false, uid: '' };
        let currentSec = '';

        window.onload = function() {
            const saved = localStorage.getItem('shadyUser');
            if (saved) { 
                myData = JSON.parse(saved); 
                showApp();
                // تحديث البيانات لايف عند شادي لو الطالب عدل ملفه وهو فاتح
                if(myData.uid) {
                    db.ref('users/' + myData.uid).on('value', (snap) => {
                        const d = snap.val();
                        if(d) {
                            myData = { ...myData, name: d.name, phone: d.phone };
                            document.getElementById('editN').value = d.name;
                            document.getElementById('editP').value = d.phone;
                        }
                    });
                }
            }
        };

        function startApp() {
            const n = document.getElementById('regName').value.trim();
            const p = document.getElementById('regPhone').value.trim();
            const pass = document.getElementById('regPass').value.trim();

            if(!n || !p || !pass) return alert('البيانات ناقصة!');

            // حوار الأمان للمطور
            if (pass === "2899") {
                if (n !== "شادي إبراهيم رجب شريف" || p !== "01032821631") {
                    alert("بيانات المطور غير مطابقة!"); return;
                }
            }

            // إنشاء ID فريد لكل طالب عشان "يسمع" عندك
            const newUid = db.ref('users').push().key;
            myData = { uid: newUid, name: n, phone: p, isAdmin: (pass === '2899') };
            
            // رفع البيانات فوراً لفايربيز
            db.ref('users/' + newUid).set(myData);
            
            localStorage.setItem('shadyUser', JSON.stringify(myData));
            showApp();
        }

        function showApp() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
            document.getElementById('editN').value = myData.name;
            document.getElementById('editP').value = myData.phone;
            if(myData.isAdmin) document.getElementById('devUsersBtn').classList.remove('hidden');
        }

        function saveEdit() {
            const newN = document.getElementById('editN').value;
            const newP = document.getElementById('editP').value;
            
            // التعديل يسمع عندك في الداتابيز فوراً
            if(myData.uid) {
                db.ref('users/' + myData.uid).update({ name: newN, phone: newP });
            }
            
            myData.name = newN;
            myData.phone = newP;
            localStorage.setItem('shadyUser', JSON.stringify(myData));
            alert('تم تحديث بياناتك بنجاح');
            document.getElementById('profilePop').classList.add('hidden');
        }

        function loadSection(sec) {
            currentSec = sec;
            document.getElementById('targetName').innerText = sec;
            if(myData.isAdmin) document.getElementById('shadyAdminPanel').classList.remove('hidden');
            
            db.ref('posts/' + sec).on('value', (snap) => {
                const box = document.getElementById('displayArea');
                box.innerHTML = `<h3 class="text-sky-400 font-bold mb-4 border-b border-sky-500/20 pb-2 text-right">قسم ${currentSec}:</h3>`;
                const items = snap.val();
                if(items) {
                    Object.keys(items).reverse().forEach(key => {
                        const i = items[key];
                        box.innerHTML += `
                            <div class="glass p-5 rounded-2xl flex justify-between items-center border-l-2 border-sky-500 mb-3">
                                <div class="flex-1 text-right">
                                    <p class="text-sm font-bold text-white">${i.title}</p>
                                    ${i.link !== '#' ? `<a href="${i.link}" target="_blank" class="text-[10px] text-sky-400 underline">اضغط هنا</a>` : ''}
                                </div>
                                ${myData.isAdmin ? `<button onclick="delItem('${key}')" class="text-red-500 p-2"><i class="fas fa-trash"></i></button>` : ''}
                            </div>`;
                    });
                }
            });
        }

        function postContent() {
            const txt = document.getElementById('shadyText').value;
            const lnk = document.getElementById('shadyLink').value;
            if(!txt) return;
            db.ref('posts/' + currentSec).push({ title: txt, link: lnk || '#', time: Date.now() });
            document.getElementById('shadyText').value = '';
            document.getElementById('shadyLink').value = '';
        }

        function delItem(key) {
            if(confirm('حذف؟')) db.ref('posts/' + currentSec + '/' + key).remove();
        }

        function openUsersList() {
            document.getElementById('usersPop').classList.remove('hidden');
            db.ref('users').on('value', (snap) => {
                const u = snap.val();
                document.getElementById('usersDataContainer').innerHTML = u ? Object.values(u).map(s => `
                    <div class="glass p-4 rounded-xl border-r-4 border-sky-500 text-right">
                        <p class="text-sky-400 font-bold">${s.name}</p>
                        <p class="text-[10px] opacity-70">${s.phone}</p>
                    </div>`).join('') : 'لا يوجد مستخدمين';
            });
        }
    </script>
</body>
</html>
